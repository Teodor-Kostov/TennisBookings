<div class="card">
            <p-menubar [model]="items">
                <ng-template #start>
                    <img src="vecteezy_tennis-ball-icon_13687062.svg" alt="Tennis Ball Logo" width="33" height="33" class="block mx-auto" />
                </ng-template>
                <ng-template #item let-item let-root="root">
                    <a pRipple
                       class="flex items-center px-4 py-3 cursor-pointer gap-2 nav-link"
                       [routerLink]="item.routerLink">
                        <span>{{ item.label }}</span>
                        <p-badge *ngIf="item.badge" [ngClass]="{ 'ms-auto': !root }"  />
                        <span *ngIf="item.shortcut" class="ms-auto border border-surface rounded bg-emphasis text-muted-color text-xs p-1">{{ item.shortcut }}</span>
                        <i *ngIf="item.items" [ngClass]="['ms-auto pi', root ? 'pi-angle-down' : 'pi-angle-right']"></i>
                    </a>
                </ng-template>
                <ng-template #end>
                    <div class="flex items-center gap-2">
                        @if (user$ | async; as user) {
                            <span class="user-greeting">Welcome, {{ user.username }}</span>
                            <p-avatar image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png" shape="circle" />
                        } @else {
                           <a routerLink="/login" class="nav-link">Login</a>
                            <a routerLink="/register" class="nav-link">Register</a>
                        }
                    </div>
                </ng-template>
            </p-menubar>
        </div>
